<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  html, body { margin:0; padding:0; font-family: system-ui, sans-serif; background:transparent; }
  #wall { display:flex; flex-direction:column; gap:8px; padding:2px; }
  /* 橫向模式(比較區塊縮圖條):一列、原生水平捲軸、不換行;每格固定寬 → 可快速捲到任一張 */
  #wall.horiz { flex-direction:row; flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden;
                gap:6px; padding:2px 2px 8px; }
  #wall.horiz .cell { flex:0 0 auto; width:104px; }
  #wall.horiz .corner { max-width:96px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cell { position:relative; cursor:pointer; border:3px solid transparent; border-radius:4px;
          box-sizing:border-box; background:#1112; line-height:0; }
  .cell:hover { border-color:#4a90d9; }
  .cell.sel { border-color:#ffd000; }
  .cell img { width:100%; height:auto; display:block; border-radius:2px;
              user-select:none; -webkit-user-drag:none; }
  /* 2026-07-04 修 bug:.corner/.badge 原用實心背景色塊,若偵測框剛好落在該角(縮圖縮得很小時
     常見,見 ROADMAP)會被完全蓋住、使用者誤以為框沒畫。改用「文字 + text-shadow 描邊」
     (同既有 .mark 的作法)取代實心背景 —— 保留可讀性、不再遮住底下任何像素內容。 */
  /* 2026-07-06(User:縮圖牆右上角用小字寫檔名):.corner 由「左上索引數字」改成「右上角檔名」。
     左截斷(direction:rtl + ellipsis)保留檔名尾端(如 …frame_000.png),完整名見 title tooltip。
     維持透明底(text + shadow)—— test_thumbnail_badges_have_no_opaque_background 讀 .corner 背景 alpha≈0。 */
  .corner { position:absolute; top:2px; right:2px; z-index:2; max-width:calc(100% - 8px);
            font:10px/1.4 monospace; color:#fff; text-shadow:0 0 2px #000,0 0 2px #000,0 0 2px #000;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap; direction:rtl;
            padding:0 2px; pointer-events:none; }
  /* ⭐/✓(書籤/已審)移到左上角(原索引數字的位置;User 嫌索引 + 標記圈兩個圈太擠,索引已移除)。 */
  .mark { position:absolute; top:2px; left:2px; z-index:2; font-size:13px;
          text-shadow:0 0 3px #000; }
  .badge { position:absolute; bottom:3px; right:3px; z-index:2;
           font:11px monospace; color:#ff3b30; text-shadow:0 0 2px #000,0 0 2px #000,0 0 2px #000;
           padding:0 3px; line-height:1.5; }
  /* 2026-07-05:兩圖疊圖比較的「標記」角標(左下角,其餘三角已用:corner=左上/mark=右上/badge=右下)。
     只在 markable=true 時渲染;未標記顯示淡色提示、標記後顯示①(藍)/②(橘)呼應既有 A/B 色慣例。
     2026-07-06(User 回饋『圈圈太小』):放大成實心圓鈕——更大的字級 + 固定圓形命中區 + 半透明底,
     未標記時淡、hover 變亮,好看也好點。 */
  .cmpmark { position:absolute; bottom:4px; left:4px; z-index:3; cursor:pointer;
             width:24px; height:24px; border-radius:50%; box-sizing:border-box;
             display:flex; align-items:center; justify-content:center;
             font:bold 16px/1 monospace; color:#ddd;
             background:rgba(0,0,0,.45); border:1.5px solid rgba(255,255,255,.55);
             text-shadow:0 0 2px #000; transition:transform .1s ease, background .1s ease; }
  .cmpmark:hover { background:rgba(0,0,0,.7); border-color:#fff; transform:scale(1.12); }
  .cmpmark.m1 { color:#0a0e15; background:#4ad0ff; border-color:#bfeeff; }
  .cmpmark.m2 { color:#0a0e15; background:#ffa640; border-color:#ffd9a8; }
</style>
</head>
<body>
<div id="wall"></div>
<script>
// ---- Streamlit 元件協定(手寫,無 build;同 viewer_component 寫法)----
function post(m){ window.parent.postMessage(Object.assign({isStreamlitMessage:true}, m), "*"); }
function setH(h){ post({type:"streamlit:setFrameHeight", height:h}); }
function setVal(v){ post({type:"streamlit:setComponentValue", value:v, dataType:"json"}); }

const wall = document.getElementById('wall');
let evtN = 0;
let lastSig = null;

function render(items, selected, height, horizontal, markable){
  wall.className = horizontal ? 'horiz' : '';
  wall.innerHTML = '';
  (items || []).forEach((it, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (i === selected ? ' sel' : '');
    if (it.label != null) cell.title = String(it.label);  // 完整檔名 tooltip(角標可能被 ellipsis 截斷)

    const img = document.createElement('img');
    img.src = it.img || '';
    img.alt = (it.label != null ? String(it.label) : String(i + 1));
    img.draggable = false;
    cell.appendChild(img);

    // 角標(label 數字)
    const corner = document.createElement('div');
    corner.className = 'corner';
    corner.textContent = (it.label != null ? String(it.label) : String(i + 1));
    cell.appendChild(corner);

    // mark(⭐/✓)
    if (it.mark){
      const m = document.createElement('div');
      m.className = 'mark';
      m.textContent = it.mark;
      cell.appendChild(m);
    }

    // 偵測數徽章(nd>0)
    const nd = it.nd || 0;
    if (nd > 0){
      const b = document.createElement('div');
      b.className = 'badge';
      b.textContent = '🟥' + nd;
      cell.appendChild(b);
    }

    // 兩圖疊圖比較標記(左下角;自己的 click 用 stopPropagation 避免同時觸發整格選取)
    if (markable){
      const cm = document.createElement('div');
      const mk = it.cmpmark || '';
      cm.className = 'cmpmark' + (mk === '1' ? ' m1' : mk === '2' ? ' m2' : '');
      cm.textContent = mk === '1' ? '①' : (mk === '2' ? '②' : '○');
      cm.title = '標記此圖用於兩圖疊圖比較(最多同時標記 2 張)';
      cm.addEventListener('click', (e) => {
        e.stopPropagation();
        setVal({ type: 'mark', index: i, n: ++evtN });
      });
      cell.appendChild(cm);
    }

    // 整張可點 → 回該 index(選取/導覽)
    cell.addEventListener('click', () => {
      setVal({ type: 'select', index: i, n: ++evtN });
    });

    wall.appendChild(cell);
  });

  // setFrameHeight:用傳入 height(讓 Streamlit 容器夠高顯示整牆)
  setH(Math.max(120, height || 620));
}

window.addEventListener('message', (e) => {
  const d = e.data; if (!d || d.type !== 'streamlit:render') return;
  const args = d.args || {};
  const items = args.items || [];
  const selected = (args.selected != null) ? args.selected : 0;
  const height = args.height || 620;
  const horizontal = !!args.horizontal;
  const markable = !!args.markable;
  // 內容簽名(items 的 img/mark/nd/label/cmpmark + selected + horizontal + markable):變動才重繪
  const sig = JSON.stringify({ n: items.length, sel: selected, h: horizontal, mk: markable,
      s: items.map(it => [it.img, it.mark, it.nd, it.label, it.cmpmark]) });
  if (sig !== lastSig){
    lastSig = sig;
    render(items, selected, height, horizontal, markable);
  } else {
    setH(Math.max(120, height));
  }
});
post({type:"streamlit:componentReady", apiVersion:1}); setH(620);
</script>
</body>
</html>
